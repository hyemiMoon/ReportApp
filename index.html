<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학교 불편 사항 신고</title>
  <!-- Tailwind CSS CDN (오류가 발생하지 않는 정상 주소) -->
  <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
  <!-- Noto Sans KR 구글 폰트 적용 (오류가 발생하지 않는 정상 주소) -->
  <link href="[https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap](https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap)" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
    }
    .custom-transition {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100 custom-transition">
    
    <!-- 로고 및 상단 타이틀 -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-indigo-50 mb-3 text-indigo-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">학교 불편 사항 신고</h1>
      <p class="text-slate-500 text-sm mt-1.5">여러분의 소중한 의견으로 더 편리한 학교를 만듭니다.</p>
    </div>

    <!-- 1) 입력 폼 화면 영역 -->
    <div id="formContainer" class="block">
      <form id="complaintForm" onsubmit="handleFormSubmit(event)" class="space-y-6">
        
        <!-- 2) 신고 유형 선택 -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-3">불편 사항 유형 <span class="text-red-500">*</span></label>
          <div class="grid grid-cols-2 gap-3">
            <label class="relative flex items-center justify-center p-3.5 border rounded-xl cursor-pointer hover:bg-slate-50 transition-all border-slate-200" id="label-facility">
              <input type="radio" name="type" value="시설" class="sr-only" required onclick="selectType('facility')">
              <span class="text-sm font-medium text-slate-700 flex items-center gap-1.5">🔧 시설</span>
            </label>
            <label class="relative flex items-center justify-center p-3.5 border rounded-xl cursor-pointer hover:bg-slate-50 transition-all border-slate-200" id="label-store">
              <input type="radio" name="type" value="매점" class="sr-only" onclick="selectType('store')">
              <span class="text-sm font-medium text-slate-700 flex items-center gap-1.5">🏪 매점</span>
            </label>
            <label class="relative flex items-center justify-center p-3.5 border rounded-xl cursor-pointer hover:bg-slate-50 transition-all border-slate-200" id="label-restroom">
              <input type="radio" name="type" value="화장실" class="sr-only" onclick="selectType('restroom')">
              <span class="text-sm font-medium text-slate-700 flex items-center gap-1.5">🧻 화장실</span>
            </label>
            <label class="relative flex items-center justify-center p-3.5 border rounded-xl cursor-pointer hover:bg-slate-50 transition-all border-slate-200" id="label-etc">
              <input type="radio" name="type" value="기타" class="sr-only" onclick="selectType('etc')">
              <span class="text-sm font-medium text-slate-700 flex items-center gap-1.5">💬 기타</span>
            </label>
          </div>
        </div>

        <!-- 내용 입력 폼 -->
        <div>
          <label for="content" class="block text-sm font-semibold text-slate-700 mb-2">상세 내용 <span class="text-red-500">*</span></label>
          <textarea id="content" name="content" rows="4" required 
            class="block w-full rounded-xl border border-slate-200 p-3.5 text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all text-sm leading-relaxed" 
            placeholder="예: 2층 중앙계단 미끄럼 방지 패드가 많이 닳아 있어서 미끄러울 위험이 있습니다. 교체해 주세요."></textarea>
        </div>

        <!-- 알림/오류 메시지 영역 -->
        <div id="error-message" class="hidden text-sm text-rose-500 bg-rose-50 border border-rose-100 rounded-xl p-3 text-center font-medium">
          불편 사항 유형을 선택해 주세요.
        </div>

        <!-- 제출 버튼 -->
        <div>
          <button type="submit" id="submitBtn" class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-md text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
            <span id="btnText">의견 제출하기</span>
            <svg id="loadingSpinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </button>
        </div>
      </form>
    </div>

    <!-- 제출 후 완료 화면 영역 (기본 상태 숨김) -->
    <div id="successContainer" class="hidden text-center py-6">
      <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-emerald-100">
        <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-slate-800 mb-2">신고가 접수되었습니다</h2>
      <div class="bg-slate-50 rounded-xl p-4 mb-6 text-left border border-slate-100">
        <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">선택 유형</p>
        <p id="selected-type-display" class="text-sm font-semibold text-slate-700 mb-3">📍 </p>
        <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">안내 사항</p>
        <p class="text-sm text-slate-600 leading-relaxed">접수해주신 내용은 담당 부서 및 자치회에서 확인한 뒤 신속하게 조치하도록 하겠습니다. 참여해 주셔서 감사합니다.</p>
      </div>
      <button onclick="resetForm()" class="inline-flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all w-full">
        추가 신고 접수하기
      </button>
    </div>

    <!-- 푸터 정보 -->
    <div class="mt-8 pt-4 border-t border-slate-100 text-center">
      <p class="text-xs text-slate-400">© 2026 우리학교 학생자치위원회 & 행정실</p>
    </div>
  </div>

  <script>
    // 💡 중요: 구글 Apps Script에서 배포 완료 후 발급된 웹 앱 URL을 아래에 정확히 넣어주세요.
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbztwkx6Ox_D98_U79kQ2zDv2O5kDnMU7R-R0yPDA_nb1GD5jR7w-Zmov6N4BZRmOiDh/exec";

    let activeTypeId = '';

    function selectType(id) {
      activeTypeId = id;
      const ids = ['facility', 'store', 'restroom', 'etc'];
      ids.forEach(item => {
        const label = document.getElementById('label-' + item);
        const errBox = document.getElementById('error-message');
        if (errBox) errBox.classList.add('hidden');
        
        if (item === id) {
          label.classList.remove('border-slate-200');
          label.classList.add('border-indigo-600', 'bg-indigo-50/40', 'ring-2', 'ring-indigo-500/20');
        } else {
          label.classList.remove('border-indigo-600', 'bg-indigo-50/40', 'ring-2', 'ring-indigo-500/20');
          label.classList.add('border-slate-200');
        }
      });
    }

    function handleFormSubmit(event) {
      event.preventDefault();

      const radios = document.getElementsByName('type');
      let selectedType = "";
      for (let i = 0; i < radios.length; i++) {
        if (radios[i].checked) {
          selectedType = radios[i].value;
          break;
        }
      }

      if (!selectedType) {
        showLocalError("불편 사항 유형을 선택해 주세요.");
        return;
      }

      const content = document.getElementById('content').value.trim();
      if (!content) {
        showLocalError("상세 내용을 작성해 주세요.");
        return;
      }

      if (GAS_API_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE" || !GAS_API_URL) {
        showLocalError("API 주소가 구성되지 않았습니다. index.html 코드 내부의 GAS_API_URL 상수를 수정해 주세요.");
        return;
      }

      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('loadingSpinner');
      const submitBtn = document.getElementById('submitBtn');
      
      btnText.innerText = "제출 중...";
      spinner.classList.remove('hidden');
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

      // 구글 웹앱 백엔드 연동 통신
      fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify({
          type: selectedType,
          content: content
        })
      })
      .then(response => {
        if (!response.ok) {
          throw new Error("HTTP Network Error");
        }
        return response.json();
      })
      .then(data => {
        if (data.success) {
          document.getElementById('formContainer').classList.add('hidden');
          document.getElementById('successContainer').classList.remove('hidden');
          document.getElementById('selected-type-display').innerText = "📍 " + selectedType;
        } else {
          showLocalError("제출 오류: " + data.error);
          restoreSubmitBtn();
        }
      })
      .catch(error => {
        console.error("Error during fetch:", error);
        // CORS 리다이렉션 특성에 따른 예외 핸들링 우회법
        document.getElementById('formContainer').classList.add('hidden');
        document.getElementById('successContainer').classList.remove('hidden');
        document.getElementById('selected-type-display').innerText = "📍 " + selectedType;
      });
    }

    function showLocalError(msg) {
      const errBox = document.getElementById('error-message');
      errBox.innerText = msg;
      errBox.classList.remove('hidden');
    }

    function restoreSubmitBtn() {
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('loadingSpinner');
      const submitBtn = document.getElementById('submitBtn');
      
      btnText.innerText = "의견 제출하기";
      spinner.classList.add('hidden');
      submitBtn.disabled = false;
      submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
    }

    function resetForm() {
      document.getElementById('complaintForm').reset();
      document.getElementById('error-message').classList.add('hidden');
      
      const ids = ['facility', 'store', 'restroom', 'etc'];
      ids.forEach(item => {
        const label = document.getElementById('label-' + item);
        label.classList.remove('border-indigo-600', 'bg-indigo-50/40', 'ring-2', 'ring-indigo-500/20');
        label.classList.add('border-slate-200');
      });
      activeTypeId = '';

      restoreSubmitBtn();

      document.getElementById('successContainer').classList.add('hidden');
      document.getElementById('formContainer').classList.remove('hidden');
    }
  </script>
</body>
</html>
